services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quest_log
      POSTGRES_PASSWORD: quest_log
      POSTGRES_DB: quest_log
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quest_log"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  attachments:
