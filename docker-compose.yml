services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quest_log
      POSTGRES_PASSWORD: quest_log
      POSTGRES_DB: quest_log
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quest_log"]
      interval: 5s
      timeout: 5s
      retries: 5

  questlog:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://quest_log:quest_log@postgres:5432/quest_log
      ATTACHMENTS_DIR: /data/attachments
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - attachments:/data/attachments

volumes:
  pgdata:
  attachments:
